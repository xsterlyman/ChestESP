name: Build ChestESP Mod
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-20.04
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '8'
      - uses: gradle/gradle-build-action@v2
        with:
          gradle-version: '2.14'
      - uses: actions/cache@v3
        with:
          path: ~/.gradle/caches
          key: forge189
      - run: gradle setupDecompWorkspace --no-daemon
        timeout-minutes: 30
      - run: gradle build --no-daemon
      - uses: actions/upload-artifact@v3
        with:
          name: ChestESP-1.0.0
          path: build/libs/ChestESP-1.0.0.jar
